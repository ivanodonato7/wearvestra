[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."generate-hero"]
  timeout = 26

[functions."product-search"]
  timeout = 26

[[redirects]]
  from = "/api/stylist"
  to = "/.netlify/functions/stylist"
  status = 200

[[redirects]]
  from = "/api/product-search"
  to = "/.netlify/functions/product-search"
  status = 200

[[redirects]]
  from = "/api/generate-hero"
  to = "/.netlify/functions/generate-hero"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
