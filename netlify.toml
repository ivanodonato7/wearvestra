[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."generate-hero"]
  timeout = 26

[functions."product-search"]
  timeout = 26

[functions."product-feed-sync"]
  timeout = 10

[functions."product-feed-sync-background"]
  # Daily 07:00 UTC — long-running Create-a-Feed stream (background, up to ~15 min)
  schedule = "0 7 * * *"

[[redirects]]
  from = "/api/stylist"
  to = "/.netlify/functions/stylist"
  status = 200

[[redirects]]
  from = "/api/product-search"
  to = "/.netlify/functions/product-search"
  status = 200

# Long sync — background function (202 Accepted, continues server-side)
[[redirects]]
  from = "/api/product-feed-sync"
  to = "/.netlify/functions/product-feed-sync-background"
  status = 200

[[redirects]]
  from = "/api/product-feed-status"
  to = "/.netlify/functions/product-feed-sync"
  status = 200

[[redirects]]
  from = "/api/generate-hero"
  to = "/.netlify/functions/generate-hero"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
