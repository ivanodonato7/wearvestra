[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Approved: Claude catalog enrichment on daily Awin sync (formality/color/fit/category).
[build.environment]
  CATALOG_ENRICH = "1"
  CATALOG_ENRICH_MODEL = "claude-haiku-4-5"

[functions."generate-hero"]
  timeout = 26

[functions."product-search"]
  timeout = 26

[functions."product-feed-sync"]
  timeout = 10

[functions."product-feed-sync-background"]
  # Daily 07:00 UTC — long-running Create-a-Feed stream (background, up to ~15 min)
  # Claude enrichment enabled via CATALOG_ENRICH=1 (build.environment)
  schedule = "0 7 * * *"

[functions."catalog-enrich-sample"]
  timeout = 26

[functions."catalog-enrich-batch"]
  timeout = 26

[[redirects]]
  from = "/api/stylist"
  to = "/.netlify/functions/stylist"
  status = 200

[[redirects]]
  from = "/api/stripe-checkout"
  to = "/.netlify/functions/stripe-checkout"
  status = 200

[[redirects]]
  from = "/api/stripe-portal"
  to = "/.netlify/functions/stripe-portal"
  status = 200

[[redirects]]
  from = "/api/cancel-subscription"
  to = "/.netlify/functions/cancel-subscription"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/billing-status"
  to = "/.netlify/functions/billing-status"
  status = 200

[[redirects]]
  from = "/api/catalog-enrich-sample"
  to = "/.netlify/functions/catalog-enrich-sample"
  status = 200

[[redirects]]
  from = "/api/catalog-enrich-batch"
  to = "/.netlify/functions/catalog-enrich-batch"
  status = 200

[[redirects]]
  from = "/api/product-search"
  to = "/.netlify/functions/product-search"
  status = 200

# Long sync — background function (202 Accepted, continues server-side)
[[redirects]]
  from = "/api/product-feed-sync"
  to = "/.netlify/functions/product-feed-sync-background"
  status = 200

[[redirects]]
  from = "/api/product-feed-status"
  to = "/.netlify/functions/product-feed-sync"
  status = 200

[[redirects]]
  from = "/api/generate-hero"
  to = "/.netlify/functions/generate-hero"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
